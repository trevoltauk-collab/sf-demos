templateId: multi-sheet-example
sections:
  - sectionId: customers
    type: EXCEL
    templatePath: templates/multi-sheet-template.xlsx
    order: 1
    mappingType: JSONPATH
    fieldMappings:
      "Customers!A2:A100": "$.customers[*].name"
      "Customers!B2:B100": "$.customers[*].email"

  - sectionId: pricing
    type: EXCEL
    templatePath: templates/multi-sheet-template.xlsx
    order: 2
    mappingType: JSONPATH
    fieldMappings:
      "Pricing!A1:C10": "$.pricingTable"
