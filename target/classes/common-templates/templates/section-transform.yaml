templateId: section-transform
# two sheets: first uses transformer, second just echoes a field
# when sections share the same Excel template, the renderer now clones the
# template sheet for each section so each gets its own copy.  the cloned
# sheet is named after the sectionId by default.

sections:
  - sectionId: first
    type: EXCEL
    templatePath: comparison-template.xlsx
    mappingType: JSONPATH
    config:
      transformer: plan-comparison
    fieldMappings:
      "A1:K6": "$.comparisonMatrix"

  - sectionId: second
    type: EXCEL
    templatePath: comparison-template.xlsx
    mappingType: JSONPATH
    fieldMappings:
      "A1": "$.note"
