---
# Template for age rating matrix comparison
# 
# This template renders a 3-band age rating comparison matrix:
# - Band 1: Ages 0-30
# - Band 2: Ages 31-47
# - Band 3: Ages 48-64+
#
# Each plan has age/rating pairs arranged horizontally with spacing between bands.

templateId: age-rating-comparison
description: Age rating matrix comparison for multiple plans

config:
  # specify transformer so the server builds the matrix automatically
  transformer: age-rating
  # optional: provide JSONPath to locate plans (defaults to $.plans)
  plansPath: $.plans
  # field names used inside each plan object
  ageField: age
  ratingField: rating
  # number of empty columns between each plan band
  columnSpacing: 1

sections:
  - sectionId: age_rating_matrix
    type: EXCEL
    templatePath: age-rating-template.xlsx
    mappingType: JSONPATH
    fieldMappings:
      "A1:Z100": "$.comparisonMatrix"
    overwrite: true
