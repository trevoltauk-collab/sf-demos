templateId: plan-comparison-explicit-plans
description: Template that uses transformer property to trigger plan-comparison logic

config:
  transformer: plan-comparison
  # we can also override the location of the plans array with plansPath
  # (defaults to $.plans if omitted)
  plansPath: "$.plans"
  columnSpacing: 2

sections:
  - sectionId: plan_comparison
    type: EXCEL
    templatePath: comparison-template.xlsx
    mappingType: JSONPATH
    fieldMappings:
      "A1:K6": "$.comparisonMatrix"
