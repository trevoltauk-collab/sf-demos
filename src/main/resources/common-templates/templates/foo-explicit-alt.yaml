templateId: plan-comparison-explicit-plans-alt

# same as foo-explicit but looking for plans under a different root key

description: Template that uses transformer property to trigger plan-comparison logic (alternate plans key)

config:
  transformer: plan-comparison
  # override location of the plans array (defaults to $.plans if omitted)
  plansPath: "$.altPlans"
  columnSpacing: 2

sections:
  - sectionId: plan_comparison
    type: EXCEL
    templatePath: comparison-template.xlsx
    mappingType: JSONPATH
    fieldMappings:
      "A1:K6": "$.comparisonMatrix"
