---
# Template for plan comparison with MODE 1: Name-based matching
# 
# Use this template when the Excel template already has benefit names
# populated in the first column. The renderer will match incoming benefit
# names to the template names and write values to the correct rows.
# 
# This allows incoming plan data to have benefits in any order;
# they will be placed into the template rows matching their names.

templateId: plan-comparison-name-matching
description: Plan comparison with name-based benefit matching (Mode 1)

# Configuration for plan comparison transformation
config:
  columnSpacing: 0
  # When true, DocumentComposer injects comparisonMatrixValues (used when
  # the template already contains benefit names in column A). When false,
  # the full matrix (including the "Benefit" column) will be injected and
  # written into the worksheet (auto-generating benefit names).
  matchBenefitNamesInTemplate: true

sections:
  - sectionId: plan_comparison
    type: EXCEL
    templatePath: comparison-template-prefilled.xlsx
    mappingType: JSONPATH

    # For this template we want auto-generated benefit names (template does
    # not pre-populate them), therefore name matching is disabled.
    matchBenefitNamesInTemplate: true

    fieldMappings:
      # Map comparison matrix including the Benefit column into the full
      # range so that the first column is populated with benefit names.
      "B1:G6": "$.comparisonMatrixValues"

    overwrite: true
